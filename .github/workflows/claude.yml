# Interactive Claude on GitHub: mention @claude in an issue, PR, or review thread.
#
# Auth: CLAUDE_CODE_OAUTH_TOKEN (repository secret) — uses a Claude Pro/Max
# subscription instead of pay-as-you-go API credit. Generate it locally with
# `claude setup-token`, then: `gh secret set CLAUDE_CODE_OAUTH_TOKEN`.
# Setup:    https://github.com/anthropics/claude-code-action/blob/main/docs/setup.md
# Security: https://github.com/anthropics/claude-code-action/blob/main/docs/security.md

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Author gate: only the repo owner/members/collaborators can trigger the
    # agent. '@claude' is a string match, not an identity check — without this
    # guard any external user could invoke a write-capable agent by commenting.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    # Least privilege: no id-token (OIDC) — auth is the OAuth token, not cloud federation.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 15
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
          plugins: |
            code-review@claude-plugins-official
